<svg xmlns="http://www.w3.org/2000/svg" width="880" height="200" viewBox="0 0 880 200">
  <style>
    .font { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, Consolas, monospace; }
    .bold { font-weight: 600; }
    .title { font-size: 14px; fill: #e2e8f0; font-weight: 700; }
    .subtitle { font-size: 11px; fill: #5a6577; }
    .model { font-size: 11px; fill: #8b95a8; }
    .model-hi { font-size: 11px; fill: #e2e8f0; font-weight: 600; }
    .note { font-size: 10px; fill: #5a6577; font-style: italic; }
    .status { font-size: 10px; fill: #34d399; font-weight: 600; }
  </style>

  <rect width="880" height="200" rx="12" fill="#0d1117"/>

  <!-- Card 1: Claude -->
  <g transform="translate(12, 16)">
    <rect width="205" height="168" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1"/>

    <!-- Icon -->
    <rect x="14" y="14" width="32" height="32" rx="7" fill="url(#grad-claude)"/>
    <text x="30" y="36" text-anchor="middle" class="font bold" font-size="16" fill="#fff">C</text>

    <!-- Name + status -->
    <text x="54" y="28" class="font title">Claude</text>
    <text x="54" y="42" class="font subtitle">Anthropic</text>
    <circle cx="184" cy="26" r="4" fill="#34d399"/>

    <!-- Models -->
    <rect x="14" y="58" width="72" height="20" rx="4" fill="#1a2235" stroke="#38bdf8" stroke-width="1"/>
    <text x="50" y="72" text-anchor="middle" class="mono model-hi" fill="#38bdf8">opus-4-6</text>

    <text x="96" y="72" class="mono model">sonnet-4-6</text>

    <!-- Note -->
    <line x1="14" y1="90" x2="191" y2="90" stroke="#1e293b" stroke-width="1"/>
    <text x="14" y="108" class="font note">Uses existing subscription</text>

    <!-- Model count -->
    <rect x="14" y="120" width="46" height="18" rx="4" fill="#1a2235"/>
    <text x="37" y="133" text-anchor="middle" class="mono" font-size="10" fill="#8b95a8">3 models</text>
  </g>

  <!-- Card 2: Codex (OpenAI) -->
  <g transform="translate(228, 16)">
    <rect width="205" height="168" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1"/>

    <!-- Icon -->
    <rect x="14" y="14" width="32" height="32" rx="7" fill="url(#grad-codex)"/>
    <text x="30" y="36" text-anchor="middle" class="font bold" font-size="16" fill="#fff">O</text>

    <!-- Name + status -->
    <text x="54" y="28" class="font title">Codex</text>
    <text x="54" y="42" class="font subtitle">OpenAI</text>
    <circle cx="184" cy="26" r="4" fill="#34d399"/>

    <!-- Models -->
    <rect x="14" y="58" width="62" height="20" rx="4" fill="#1a2235" stroke="#34d399" stroke-width="1"/>
    <text x="45" y="72" text-anchor="middle" class="mono model-hi" fill="#34d399">gpt-5.4</text>

    <text x="86" y="72" class="mono model" fill="#5a6577">o3</text>
    <text x="112" y="72" class="mono model" fill="#5a6577">o4-mini</text>

    <!-- Note -->
    <line x1="14" y1="90" x2="191" y2="90" stroke="#1e293b" stroke-width="1"/>
    <text x="14" y="108" class="font note">Uses existing ChatGPT sub</text>

    <!-- Model count -->
    <rect x="14" y="120" width="46" height="18" rx="4" fill="#1a2235"/>
    <text x="37" y="133" text-anchor="middle" class="mono" font-size="10" fill="#8b95a8">4 models</text>
  </g>

  <!-- Card 3: Grok -->
  <g transform="translate(444, 16)">
    <rect width="205" height="168" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1"/>

    <!-- Icon -->
    <rect x="14" y="14" width="32" height="32" rx="7" fill="url(#grad-grok)"/>
    <text x="30" y="36" text-anchor="middle" class="font bold" font-size="16" fill="#fff">X</text>

    <!-- Name + status -->
    <text x="54" y="28" class="font title">Grok</text>
    <text x="54" y="42" class="font subtitle">xAI</text>
    <circle cx="184" cy="26" r="4" fill="#34d399"/>

    <!-- Models -->
    <rect x="14" y="58" width="62" height="20" rx="4" fill="#1a2235" stroke="#38bdf8" stroke-width="1"/>
    <text x="45" y="72" text-anchor="middle" class="mono model-hi" fill="#38bdf8">grok-4</text>

    <text x="86" y="72" class="mono model" fill="#5a6577">grok-4-fast</text>

    <!-- Note -->
    <line x1="14" y1="90" x2="191" y2="90" stroke="#1e293b" stroke-width="1"/>
    <text x="14" y="108" class="font note">Web search · 2M context</text>

    <!-- Model count -->
    <rect x="14" y="120" width="46" height="18" rx="4" fill="#1a2235"/>
    <text x="37" y="133" text-anchor="middle" class="mono" font-size="10" fill="#8b95a8">2 models</text>
  </g>

  <!-- Card 4: Local -->
  <g transform="translate(660, 16)">
    <rect width="205" height="168" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1"/>

    <!-- Icon -->
    <rect x="14" y="14" width="32" height="32" rx="7" fill="url(#grad-local)"/>
    <text x="30" y="37" text-anchor="middle" font-size="18">🦙</text>

    <!-- Name + status -->
    <text x="54" y="28" class="font title">Local</text>
    <text x="54" y="42" class="font subtitle">Ollama / MLX</text>
    <circle cx="184" cy="26" r="4" fill="#34d399"/>

    <!-- Models -->
    <rect x="14" y="58" width="72" height="20" rx="4" fill="#1a2235" stroke="#38bdf8" stroke-width="1"/>
    <text x="50" y="72" text-anchor="middle" class="mono model-hi" fill="#38bdf8">qwen-3.5</text>

    <text x="96" y="72" class="mono model" fill="#5a6577">gemma-3</text>

    <!-- Note -->
    <line x1="14" y1="90" x2="191" y2="90" stroke="#1e293b" stroke-width="1"/>
    <text x="14" y="108" class="font note">Zero-cost · No internet</text>

    <!-- Model count -->
    <rect x="14" y="120" width="46" height="18" rx="4" fill="#1a2235"/>
    <text x="37" y="133" text-anchor="middle" class="mono" font-size="10" fill="#8b95a8">3 models</text>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="grad-claude" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="grad-codex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="grad-grok" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="grad-local" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
</svg>
